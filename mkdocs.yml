site_name: Reversense Documentation
site_url: https://docs.reversense.org/
copyright: "2020–2026 Reversense — GNU Affero General Public License v3"

not_in_nav: |
  mentions-legales.md
  confidentialite.md

repo_name: reversenseorg/dexcalibur
repo_url: https://github.com/reversenseorg/dexcalibur
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.svg
  favicon: assets/logo.webp
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Passer en mode sombre
    - media: "(prefers-color-scheme: dark)"
      scheme: reversense
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
  features:
    # - navigation.instant      # navigation sans rechargement de page
    - navigation.tracking     # met à jour l'URL selon la section lue
    - navigation.top          # bouton "revenir en haut"
    - navigation.sections
    - search.suggest          # suggestions de recherche
    - search.highlight        # surligne les termes trouvés
    - content.code.copy       # bouton "copier" sur les blocs de code
    - content.action.edit     # bouton "éditer cette page"

extra_css:
  - stylesheets/reversense.css
nav:
  - Home: index.md
  - Getting Started:
      - Overview: getting-started/overview.md
      - Quickstart: getting-started/quickstart.md
      - Installation: getting-started/installation.md
      - Key concepts: getting-started/concept.md
      - Processus:
          - Overview: getting-started/processus.md
          - Discovery: getting-started/workflow/discovery.md
          - Modeling: getting-started/workflow/modeling.md
          - Instrumentation: getting-started/workflow/instrumentation.md
          - Execution: getting-started/workflow/execution.md
  - Guides:
      - Features:
          - Overview: guides/features/overview.md
          - Modeling: guides/features/modeling.md
          - Decompiler: guides/features/decompiler.md
          - Hooking: guides/features/hooking.md
          - Merlin Search: guides/features/merlin-search.md
          - Security assessment: guides/features/security.md
          - Teamwork: guides/features/teamwork.md
      - Configuration: guides/configuration.md
      - Best practices: guides/best-practices.md
      - Agent: guides/agent.md
  - Tutorials:
      - tutorials/index.md
  - Reference:
      - API: reference/api.md
      - Configuration: reference/configuration.md
      - Glossary: reference/glossary.md
  - Integrations:
      - AI interops: integrations/ai.md
      - Radare2: integrations/radare2.md
      - MCP: integrations/mcp.md
      - OpenAPI: integrations/openapi.md
  - Resources:
      - FAQ: resources/faq.md
      - Troubleshooting: resources/troubleshooting.md
      - Changelog: resources/changelog.md
      - Contributing: resources/contributing.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      lang: fr
